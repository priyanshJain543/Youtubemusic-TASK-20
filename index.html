<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <link rel="icon" type="image/x-icon" href="https://music.youtube.com/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <nav>
        <div class="logo-group">
            <i class="ri-youtube-fill ri-3x" style="color: var(--accent-color); margin-right: 15px;"></i>
            <h2>YouTube Music</h2>
        </div>
        <div class="search-profile-group">
            <input type="text" id="search-input" placeholder="Search songs...">
            <div class="profile-icon">
                <img src="https://i.pinimg.com/736x/2d/fa/30/2dfa30403ef8952db7c496f744df85e6.jpg"
                    style="height: 40px; width: 40px; border-radius: 50%; object-fit: cover;" alt="">
            </div>
        </div>
    </nav>

    <div id="main">
        <div id="left">
            <div class="card-inner">
                <div class="card-front"></div>
                <div class="card-back">
                    <div class="lyrics-wrapper">
                        <h3 id="lyrics-title">Lyrics</h3>
                        <p id="lyrics-text">Select a song...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="right">
            <h3>All Songs</h3>
            <div id="all-songs"></div>
        </div>
    </div>

    <div id="player">
        <div id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="time-display">
            <span id="current-time">0:00</span> / <span id="total-duration">0:00</span>
        </div>

        <input type="range" id="seekbar" value="0" step="0.1">

        <div class="controls">
            <h3 id="backward"><i class="ri-skip-back-fill"></i></h3>
            <div id="play"><i class="ri-play-mini-fill"></i></div>
            <h3 id="forward"><i class="ri-skip-forward-fill"></i></h3>
        </div>

        <div class="volume-box">
            <i class="ri-volume-up-fill"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
